<script>
// ━━ STATE ━━
let state = JSON.parse(localStorage.getItem('tabi4_state') || 'null') || {
  title: '',
  dates: [],
  items: {}
};
let curDate = state.dates[0] || null;
let selC = 1, curId = null, dragSrc = null;

function save() { localStorage.setItem('tabi4_state', JSON.stringify(state)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hasDet(it) { return it.memo || (it.urls&&it.urls.length) || (it.images&&it.images.length); }

// ━━ RENDER ITEMS ━━
function renderItems() {
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  const items = state.items[curDate] || [];

  items.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.draggable = true;

    row.innerHTML = `
      <div class="i-strip" data-c="${it.color}"></div>
      <div class="i-drag">⠿</div>
      <div class="i-time">${it.time || ''}</div>
      <div class="i-name">${esc(it.name)}</div>
    `;

    // ===== PCドラッグ =====
    row.addEventListener('dragstart', () => {
      dragSrc = idx;
      row.classList.add('dragging');
    });

    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
    });

    row.addEventListener('dragover', e => {
      e.preventDefault();
    });

    row.addEventListener('drop', () => {
      if (dragSrc === idx) return;
      const arr = state.items[curDate];
      const moved = arr.splice(dragSrc, 1)[0];
      arr.splice(idx, 0, moved);
      save();
      renderItems();
    });

    // ===== 📱スマホ長押しドラッグ =====
    let touchTimer;
    let isDragging = false;

    row.addEventListener('touchstart', () => {
      touchTimer = setTimeout(() => {
        isDragging = true;
        dragSrc = idx;
        row.classList.add('dragging');

        if (navigator.vibrate) navigator.vibrate(10);
      }, 300);
    });

    row.addEventListener('touchmove', e => {
      if (!isDragging) return;

      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el?.closest('.item-row');

      document.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over'));

      if (target) target.classList.add('drag-over');
    });

    row.addEventListener('touchend', e => {
      clearTimeout(touchTimer);

      if (!isDragging) return;

      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el?.closest('.item-row');

      if (target) {
        const newIdx = Array.from(target.parentNode.children).indexOf(target);

        if (dragSrc !== null && dragSrc !== newIdx) {
          const arr = state.items[curDate];
          const moved = arr.splice(dragSrc, 1)[0];
          arr.splice(newIdx, 0, moved);
          save();
          renderItems();
        }
      }

      isDragging = false;
      dragSrc = null;
      row.classList.remove('dragging');
    });

    // タップで詳細（ドラッグと分離）
    row.addEventListener('click', e => {
      if (isDragging) return;
      console.log('open detail', it.name);
    });

    list.appendChild(row);
  });
}

renderItems();
</script>
