<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today ✈ 旅のしおり</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,700;1,700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#5BC4DC; --sky-deep:#3AAFC9; --sky-light:#A8DFF0; --sky-pale:#E8F7FC;
  --ink:#1C3A4A; --ink-mid:#4A7A8A; --ink-soft:#9ABDC8; --border:#D0EAF2;
  --white:#FFFFFF;
  --c1:#F4A0A0; --c2:#7DD4AC; --c3:#5BC4DC; --c4:#F7D080; --c5:#C5A8E0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--sky-pale);color:var(--ink);min-height:100vh;}

/* ━━ HEADER ━━ */
.header{
background:linear-gradient(160deg,#52C8E0 0%,#3AAFC9 55%,#2A9AB5 100%);
position:sticky;top:0;z-index:100;
box-shadow:0 3px 20px rgba(28,58,74,.2);
position:sticky; /* keep sticky */
}
.header-inner{display:flex;align-items:center;padding:14px 18px 10px;gap:10px;min-height:62px;}

/* TODAY white outline italic */
.logo-wrap{position:relative;display:inline-block;line-height:1;}
.lt-white{
font-family:‘Libre Baskerville’,serif;
font-style:italic;font-weight:700;font-size:32px;letter-spacing:-0.5px;
color:#fff;
text-shadow:
0 0 1px rgba(255,255,255,.6),
1px 1px 3px rgba(28,58,74,.25);
display:block;white-space:nowrap;
}
.logo-sub{font-size:10px;color:rgba(255,255,255,.82);letter-spacing:.14em;text-transform:uppercase;margin-top:1px;}

/* trip title in header */
.header-trip{
flex:1;
font-family:‘Zen Maru Gothic’,sans-serif;
font-size:14px;font-weight:700;
color:rgba(255,255,255,.95);
border:none;background:transparent;outline:none;
min-width:0;
}
.header-trip::placeholder{color:rgba(255,255,255,.55);font-weight:400;}

/* wave */
.header-wave{display:block;overflow:hidden;line-height:0;height:18px;}
.header-wave svg{display:block;width:100%;height:100%;}

/* birds */
.birds-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.bird{position:absolute;opacity:.88;}
@keyframes float1{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-5px) rotate(2deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-7px) rotate(-2deg)}}
.bird:nth-child(1){animation:float1 3.2s ease-in-out infinite;}
.bird:nth-child(2){animation:float2 2.7s ease-in-out infinite;}

/* ━━ DATE TABS ━━ */
.date-bar-wrap{
background:var(–white);
border-bottom:1.5px solid var(–border);
position:sticky;top:0;z-index:90;
/* will be set below sticky offset after header */
}
.date-bar{
display:flex;align-items:center;gap:0;
overflow-x:auto;padding:10px 12px 8px;
scrollbar-width:none;
}
.date-bar::-webkit-scrollbar{display:none;}

.date-tab{
flex-shrink:0;
display:flex;flex-direction:column;align-items:center;
padding:7px 14px;margin-right:6px;
border-radius:12px;cursor:pointer;
border:1.5px solid var(–border);
background:var(–white);
transition:all .15s;
min-width:56px;
}
.date-tab:hover{border-color:var(–sky);background:var(–sky-pale);}
.date-tab.active{background:var(–sky-deep);border-color:var(–sky-deep);}
.date-tab .dt-day{font-size:10px;font-weight:700;color:var(–ink-soft);letter-spacing:.04em;}
.date-tab.active .dt-day{color:rgba(255,255,255,.8);}
.date-tab .dt-num{font-size:18px;font-weight:700;color:var(–ink);line-height:1.1;}
.date-tab.active .dt-num{color:#fff;}
.date-tab .dt-wd{font-size:10px;color:var(–ink-soft);}
.date-tab.active .dt-wd{color:rgba(255,255,255,.75);}

.date-add-btn{
flex-shrink:0;
width:40px;height:40px;
border-radius:12px;
border:1.5px dashed var(–sky);
background:var(–white);
color:var(–sky-deep);
font-size:20px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background .15s;
}
.date-add-btn:hover{background:var(–sky-pale);}

/* ━━ MAIN ━━ */
.main{max-width:680px;margin:0 auto;padding:16px 15px 120px;}

/* ━━ ADD BAR ━━ */
.add-bar{background:var(–white);border:1.5px solid var(–border);border-radius:14px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;box-shadow:0 1px 6px rgba(91,196,220,.08);}
.add-name{font-family:‘Zen Maru Gothic’,sans-serif;font-size:14px;border:none;background:transparent;color:var(–ink);outline:none;flex:1;min-width:120px;}
.add-name::placeholder{color:var(–ink-soft);}
.add-time{font-family:‘Zen Maru Gothic’,sans-serif;font-size:13px;border:1px solid var(–border);border-radius:8px;background:var(–sky-pale);color:var(–ink);padding:5px 8px;outline:none;width:90px;}
.cdots{display:flex;gap:5px;}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.cdot:hover{transform:scale(1.2);}
.cdot.sel{border-color:var(–ink);transform:scale(1.18);}
.cdot[data-c=“1”]{background:var(–c1)}.cdot[data-c=“2”]{background:var(–c2)}.cdot[data-c=“3”]{background:var(–c3)}.cdot[data-c=“4”]{background:var(–c4)}.cdot[data-c=“5”]{background:var(–c5)}
.add-btn{background:linear-gradient(135deg,var(–sky-deep),var(–sky));color:#fff;border:none;border-radius:10px;width:34px;height:34px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(58,175,201,.35);transition:opacity .15s,transform .1s;}
.add-btn:hover{opacity:.82}.add-btn:active{transform:scale(.91)}

/* no-date info */
.no-date{text-align:center;padding:40px 20px;color:var(–ink-soft);}
.no-date .ei{font-size:38px;margin-bottom:10px;}
.no-date p{font-size:13px;line-height:1.8;}

/* ━━ ITEMS ━━ */
.items-list{display:flex;flex-direction:column;gap:8px;}
.item-row{background:var(–white);border:1.5px solid var(–border);border-radius:13px;display:flex;align-items:center;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .12s;}
.item-row:hover{box-shadow:0 4px 16px rgba(91,196,220,.22);transform:translateY(-1px);}
.item-row.completed{opacity:.6;}
.item-row.dragging{opacity:.45;transform:scale(.97);box-shadow:0 8px 24px rgba(28,58,74,.18);}
.item-row.drag-over{border-color:var(–sky);box-shadow:0 0 0 2.5px var(–sky-light);}
.i-strip{width:5px;align-self:stretch;flex-shrink:0;}
.i-strip[data-c=“1”]{background:var(–c1)}.i-strip[data-c=“2”]{background:var(–c2)}.i-strip[data-c=“3”]{background:var(–c3)}.i-strip[data-c=“4”]{background:var(–c4)}.i-strip[data-c=“5”]{background:var(–c5)}
/* ドラッグハンドル：三本線アイコン、ここだけ長押し有効 */
.i-handle{
width:36px;align-self:stretch;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
cursor:grab;
touch-action:none;
user-select:none;
-webkit-user-select:none;
background:none;
border:none;padding:0;
}
.i-handle:active{cursor:grabbing;}
.i-handle svg{pointer-events:none;}
.i-time{font-size:12px;color:var(–sky-deep);font-weight:700;padding:13px 6px 13px 2px;flex-shrink:0;white-space:nowrap;min-width:46px;letter-spacing:.02em;}
.i-sep{width:1px;height:22px;background:var(–border);flex-shrink:0;}
.i-name{flex:1;font-size:14px;font-weight:500;padding:13px 6px 13px 10px;color:var(–ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-row.completed .i-name{text-decoration:line-through;color:var(–ink-soft);}
.i-pin{font-size:12px;padding:13px 10px 13px 2px;color:var(–ink-soft);flex-shrink:0;}

.empty-state{text-align:center;padding:40px 20px;color:var(–ink-soft);}
.empty-state .ei{font-size:38px;margin-bottom:10px;}
.empty-state p{font-size:13px;line-height:1.8;}

/* ━━ MODAL ━━ */
.overlay{position:fixed;inset:0;background:rgba(28,58,74,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(–white);border-radius:22px 22px 0 0;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding-bottom:48px;transform:translateY(50px);transition:transform .28s cubic-bezier(.34,1.25,.64,1);}
.overlay.open .modal{transform:translateY(0);}
.m-handle{width:36px;height:4px;background:var(–border);border-radius:2px;margin:14px auto 0;}
.m-stripe{height:5px;margin-top:12px;}
.m-stripe[data-c=“1”]{background:var(–c1)}.m-stripe[data-c=“2”]{background:var(–c2)}.m-stripe[data-c=“3”]{background:var(–c3)}.m-stripe[data-c=“4”]{background:var(–c4)}.m-stripe[data-c=“5”]{background:var(–c5)}
.m-topbar{display:flex;align-items:center;gap:10px;padding:14px 18px 12px;border-bottom:1.5px solid var(–border);}
.m-title{flex:1;font-size:16px;font-weight:700;color:var(–ink);}
.m-time-edit{font-family:‘Zen Maru Gothic’,sans-serif;font-size:13px;border:1px solid var(–border);border-radius:8px;background:var(–sky-pale);color:var(–ink);padding:5px 8px;outline:none;width:90px;}
.m-close{background:none;border:none;font-size:17px;color:var(–ink-soft);cursor:pointer;padding:4px;}
.m-close:hover{color:var(–ink)}
.m-body{padding:16px 18px;display:flex;flex-direction:column;gap:18px;}
.sec-lbl{font-size:10px;font-weight:700;color:var(–sky-deep);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
.m-textarea{font-family:‘Zen Maru Gothic’,sans-serif;font-size:14px;color:var(–ink);border:1.5px solid var(–border);border-radius:10px;background:var(–sky-pale);padding:12px;resize:none;outline:none;width:100%;min-height:88px;line-height:1.7;transition:border-color .15s;}
.m-textarea:focus{border-color:var(–sky)}.m-textarea::placeholder{color:var(–ink-soft)}
.url-row{display:flex;gap:8px;align-items:center;}
.m-url{font-family:‘Zen Maru Gothic’,sans-serif;font-size:13px;border:1.5px solid var(–border);border-radius:10px;background:var(–sky-pale);color:var(–ink);padding:9px 12px;outline:none;flex:1;transition:border-color .15s;}
.m-url:focus{border-color:var(–sky)}.m-url::placeholder{color:var(–ink-soft)}
.url-btn{background:linear-gradient(135deg,var(–sky-deep),var(–sky));color:#fff;border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .15s;}
.url-btn:hover{opacity:.8}
.url-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.url-chip{display:flex;align-items:center;gap:8px;background:var(–sky-pale);border:1px solid var(–border);border-radius:8px;padding:7px 10px;font-size:12px;}
.url-chip a{flex:1;color:var(–sky-deep);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.url-chip a:hover{text-decoration:underline}
.url-del{background:none;border:none;color:var(–ink-soft);cursor:pointer;font-size:13px;padding:0 2px;}
.url-del:hover{color:var(–ink)}
/* 画像追加ボタン（アイコンのみ） */
.img-action-row{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.img-icon-btn{background:none;border:none;color:var(–sky-deep);cursor:pointer;padding:4px;display:flex;align-items:center;opacity:.85;transition:opacity .15s,transform .15s;}
.img-icon-btn:hover{opacity:1;transform:scale(1.1);}
.hidden-f{display:none;}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.img-wrap{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;}
.img-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:opacity .15s;}
.img-wrap img:hover{opacity:.88;}
.img-del{position:absolute;top:4px;right:4px;background:rgba(28,58,74,.65);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* ライトボックス */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lb-img{max-width:94vw;max-height:88vh;border-radius:10px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.lb-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:20px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.m-color-row{display:flex;gap:8px;}
.mcd{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.mcd:hover{transform:scale(1.15)}.mcd.sel{border-color:var(–ink);transform:scale(1.12)}
.mcd[data-c=“1”]{background:var(–c1)}.mcd[data-c=“2”]{background:var(–c2)}.mcd[data-c=“3”]{background:var(–c3)}.mcd[data-c=“4”]{background:var(–c4)}.mcd[data-c=“5”]{background:var(–c5)}
.m-del{background:none;border:1.5px solid #F4A0A0;border-radius:10px;color:#C05050;font-family:‘Zen Maru Gothic’,sans-serif;font-size:13px;padding:11px;cursor:pointer;width:100%;margin-top:4px;transition:background .15s;}
.m-del:hover{background:#FDE8E8}

/* ━━ DATE MODAL ━━ */
.date-overlay{position:fixed;inset:0;background:rgba(28,58,74,.45);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.date-overlay.open{opacity:1;pointer-events:all;}
.date-modal{background:var(–white);border-radius:20px;padding:28px 24px 24px;width:90%;max-width:340px;box-shadow:0 12px 40px rgba(28,58,74,.2);transform:scale(.95);transition:transform .22s cubic-bezier(.34,1.3,.64,1);}
.date-overlay.open .date-modal{transform:scale(1);}
.dm-title{font-size:15px;font-weight:700;color:var(–ink);margin-bottom:16px;text-align:center;}
.dm-input{font-family:‘Zen Maru Gothic’,sans-serif;font-size:15px;border:1.5px solid var(–border);border-radius:10px;background:var(–sky-pale);color:var(–ink);padding:10px 12px;outline:none;width:100%;transition:border-color .15s;}
.dm-input:focus{border-color:var(–sky);}
.dm-btns{display:flex;gap:10px;margin-top:16px;}
.dm-cancel{flex:1;background:none;border:1.5px solid var(–border);border-radius:10px;color:var(–ink-mid);font-family:‘Zen Maru Gothic’,sans-serif;font-size:14px;padding:10px;cursor:pointer;transition:background .15s;}
.dm-cancel:hover{background:var(–sky-pale);}
.dm-ok{flex:1;background:linear-gradient(135deg,var(–sky-deep),var(–sky));border:none;border-radius:10px;color:#fff;font-family:‘Zen Maru Gothic’,sans-serif;font-size:14px;padding:10px;cursor:pointer;transition:opacity .15s;}
.dm-ok:hover{opacity:.82}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(–border);border-radius:2px}
</style>

</head>

<!-- DATE PICKER MODAL -->

<div class="date-overlay" id="dateOverlay">
  <div class="date-modal">
    <div class="dm-title">📅 日付を追加</div>
    <input class="dm-input" id="dmInput" type="date">
    <div class="dm-btns">
      <button class="dm-cancel" id="dmCancel">キャンセル</button>
      <button class="dm-ok" id="dmOk">追加する</button>
    </div>
  </div>
</div>

<script>
// ━━ STATE ━━
let state = JSON.parse(localStorage.getItem('tabi4_state') || 'null') || {
  title: '',
  dates: [],      // sorted array of "YYYY-MM-DD"
  items: {}       // { "YYYY-MM-DD": [{id,name,time,color,done,memo,urls,images}] }
};
let curDate = state.dates[0] || null;
let selC = 1, curId = null;

function save() { localStorage.setItem('tabi4_state', JSON.stringify(state)); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hasDet(it) { return it.memo || (it.urls&&it.urls.length) || (it.images&&it.images.length); }

// ━━ TRIP TITLE ━━
const tti = document.getElementById('tripTitle');
tti.value = state.title;
tti.addEventListener('input', () => { state.title = tti.value; save(); });

// ━━ DATE HELPERS ━━
const WD = ['日','月','火','水','木','金','土'];
function parseDateStr(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtDateTab(s) {
  const dt = parseDateStr(s);
  return { mon: dt.getMonth()+1, day: dt.getDate(), wd: WD[dt.getDay()] };
}

// ━━ RENDER DATE TABS ━━
function renderDateBar() {
  const bar = document.getElementById('dateBar');
  // remove old tabs
  bar.querySelectorAll('.date-tab').forEach(t => t.remove());
  const addBtn = document.getElementById('dateAddBtn');
  state.dates.forEach(ds => {
    const {mon,day,wd} = fmtDateTab(ds);
    const tab = document.createElement('div');
    tab.className = 'date-tab' + (ds === curDate ? ' active' : '');
    tab.dataset.date = ds;
    tab.innerHTML = `<span class="dt-day">${mon}月</span><span class="dt-num">${day}</span><span class="dt-wd">${wd}</span>`;
    tab.addEventListener('click', () => { curDate = ds; renderDateBar(); renderItems(); });

    // long press to delete date
    let pressTimer;
    tab.addEventListener('pointerdown', () => {
      pressTimer = setTimeout(() => {
        if (confirm(`${mon}/${day} を削除しますか？（予定も消えます）`)) {
          state.dates = state.dates.filter(d => d !== ds);
          delete state.items[ds];
          if (curDate === ds) curDate = state.dates[0] || null;
          save(); renderDateBar(); renderItems();
        }
      }, 700);
    });
    tab.addEventListener('pointerup', () => clearTimeout(pressTimer));
    tab.addEventListener('pointercancel', () => clearTimeout(pressTimer));

    bar.insertBefore(tab, addBtn);
  });
}

// ━━ ADD DATE ━━
document.getElementById('dateAddBtn').addEventListener('click', () => {
  // default to tomorrow or day after last date
  let def = new Date();
  if (state.dates.length) {
    const last = parseDateStr(state.dates[state.dates.length - 1]);
    def = new Date(last); def.setDate(def.getDate() + 1);
  }
  document.getElementById('dmInput').value = def.toISOString().slice(0,10);
  document.getElementById('dateOverlay').classList.add('open');
});
document.getElementById('dmCancel').addEventListener('click', () => document.getElementById('dateOverlay').classList.remove('open'));
document.getElementById('dmOk').addEventListener('click', () => {
  const val = document.getElementById('dmInput').value;
  if (!val) return;
  if (!state.dates.includes(val)) {
    state.dates.push(val);
    state.dates.sort();
    if (!state.items[val]) state.items[val] = [];
  }
  curDate = val;
  save(); renderDateBar(); renderItems();
  document.getElementById('dateOverlay').classList.remove('open');
});
document.getElementById('dateOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('dateOverlay')) document.getElementById('dateOverlay').classList.remove('open');
});

// ━━ RENDER ITEMS ━━
function renderItems() {
  const noDate = document.getElementById('noDateMsg');
  const addBar = document.getElementById('addBar');
  const list = document.getElementById('itemsList');
  const empty = document.getElementById('emptyState');

  if (!curDate) {
    noDate.style.display = 'block';
    addBar.style.display = 'none';
    list.style.display = 'none';
    empty.style.display = 'none';
    return;
  }
  noDate.style.display = 'none';
  addBar.style.display = 'flex';

  const items = state.items[curDate] || [];
  list.innerHTML = '';

  if (items.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
  } else {
    list.style.display = 'flex';
    empty.style.display = 'none';
  }

  items.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row' + (it.done ? ' completed' : '');
    row.dataset.idx = idx;
    row.innerHTML = `
      <div class="i-strip" data-c="${it.color}"></div>
      <button class="i-handle" title="長押しで並び替え" aria-label="並び替え">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2"  width="10" height="2" rx="1" fill="#9ABDC8"/>
          <rect x="2" y="6"  width="10" height="2" rx="1" fill="#9ABDC8"/>
          <rect x="2" y="10" width="10" height="2" rx="1" fill="#9ABDC8"/>
        </svg>
      </button>
      <div class="i-time">${it.time ? it.time.slice(0,5) : '──:──'}</div>
      <div class="i-sep"></div>
      <div class="i-name">${esc(it.name)}</div>
      <div class="i-pin">${hasDet(it) ? '📎' : ''}</div>
    `;

    // ── 長押しドラッグ：ハンドルのみ起点 ──
    const handle = row.querySelector('.i-handle');
    let pressTimer = null;
    let isDragging = false;
    let dragSrcIdx = idx;

    handle.addEventListener('pointerdown', e => {
      e.preventDefault(); // テキスト選択を防ぐ
      pressTimer = setTimeout(() => {
        isDragging = true;
        dragSrcIdx = parseInt(row.dataset.idx);
        row.classList.add('dragging');
        handle.setPointerCapture(e.pointerId);
        if (navigator.vibrate) navigator.vibrate(25);
      }, 300);
    });

    handle.addEventListener('pointermove', e => {
      if (!isDragging) return;
      e.preventDefault();

      const allRows = [...document.querySelectorAll('.item-row')];
      allRows.forEach(r => r.classList.remove('drag-over'));

      const clientY = e.clientY;
      const target = allRows.find(r => {
        if (r === row) return false;
        const rect = r.getBoundingClientRect();
        return clientY >= rect.top && clientY <= rect.bottom;
      });

      if (target) {
        target.classList.add('drag-over');
        const toIdx = parseInt(target.dataset.idx);
        if (toIdx !== dragSrcIdx) {
          const parent = list;
          const nodes = [...parent.querySelectorAll('.item-row')];
          const fromNode = nodes[dragSrcIdx];
          const toNode   = nodes[toIdx];
          if (toIdx > dragSrcIdx) {
            parent.insertBefore(fromNode, toNode.nextSibling);
          } else {
            parent.insertBefore(fromNode, toNode);
          }
          [...parent.querySelectorAll('.item-row')].forEach((r, i) => { r.dataset.idx = i; });
          const arr = state.items[curDate];
          const moved = arr.splice(dragSrcIdx, 1)[0];
          arr.splice(toIdx, 0, moved);
          dragSrcIdx = toIdx;
          save();
        }
      }
    });

    const endDrag = () => {
      clearTimeout(pressTimer);
      if (isDragging) {
        isDragging = false;
        document.querySelectorAll('.item-row').forEach(r => r.classList.remove('dragging','drag-over'));
        renderItems();
      }
    };

    handle.addEventListener('pointerup',     endDrag);
    handle.addEventListener('pointercancel', endDrag);

    // 行クリック → モーダル（ハンドル以外）
    row.addEventListener('click', e => {
      if (e.target.closest('.i-handle')) return;
      if (isDragging) return;
      openModal(it.id);
    });

    list.appendChild(row);
  });
}

// ━━ ADD ITEM ━━
document.getElementById('colorPicker').addEventListener('click', e => {
  const d = e.target.closest('.cdot'); if (!d) return;
  document.querySelectorAll('#colorPicker .cdot').forEach(x=>x.classList.remove('sel'));
  d.classList.add('sel'); selC = +d.dataset.c;
});
function addItem() {
  if (!curDate) return;
  const nm = document.getElementById('addName').value.trim(); if (!nm) { document.getElementById('addName').focus(); return; }
  if (!state.items[curDate]) state.items[curDate] = [];
  state.items[curDate].push({ id: Date.now(), name: nm, time: document.getElementById('addTime').value, color: selC, done: false, memo: '', urls: [], images: [] });
  save(); renderItems();
  document.getElementById('addName').value = ''; document.getElementById('addTime').value = '';
  document.getElementById('addName').focus();
}
document.getElementById('addBtn').addEventListener('click', addItem);
document.getElementById('addName').addEventListener('keydown', e => { if (e.key==='Enter') addItem(); });

// ━━ MODAL ━━
function openModal(id) {
  curId = String(id);
  const it = (state.items[curDate]||[]).find(x => String(x.id) === curId); if (!it) return;
  document.getElementById('mTitle').textContent = it.name;
  document.getElementById('mTime').value = it.time || '';
  document.getElementById('mMemo').value = it.memo || '';
  document.getElementById('mStripe').dataset.c = it.color;
  document.querySelectorAll('#mColors .mcd').forEach(d=>d.classList.toggle('sel',+d.dataset.c===it.color));
  renderUrls(it); renderImgs(it);
  document.getElementById('mUrlIn').value = '';
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  if (curId && curDate) {
    const it = (state.items[curDate]||[]).find(x => String(x.id) === curId);
    if (it) { it.memo = document.getElementById('mMemo').value; it.time = document.getElementById('mTime').value; }
    save(); renderItems();
  }
  curId = null; document.getElementById('overlay').classList.remove('open');
}
document.getElementById('mClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target===document.getElementById('overlay')) closeModal(); });
document.getElementById('mColors').addEventListener('click', e => {
  const d = e.target.closest('.mcd'); if (!d||!curId||!curDate) return;
  const it = (state.items[curDate]||[]).find(x => String(x.id) === curId); if (!it) return;
  it.color = +d.dataset.c;
  document.querySelectorAll('#mColors .mcd').forEach(x=>x.classList.remove('sel')); d.classList.add('sel');
  document.getElementById('mStripe').dataset.c = it.color; save();
});
document.getElementById('mTime').addEventListener('change', () => {
  if (!curId||!curDate) return;
  const it = (state.items[curDate]||[]).find(x => String(x.id) === curId);
  if (it) { it.time = document.getElementById('mTime').value; save(); }
});
document.getElementById('mDel').addEventListener('click', () => {
  if (!curId || !curDate) return;
  if (!confirm('この項目を削除しますか？')) return;
  state.items[curDate] = (state.items[curDate]||[]).filter(x => String(x.id) !== curId);
  save();
  curId = null;
  document.getElementById('overlay').classList.remove('open');
  renderItems();
});

// URLs
function renderUrls(it) {
  const ul = document.getElementById('urlList'); ul.innerHTML = '';
  (it.urls||[]).forEach((url,i)=>{
    const c = document.createElement('div'); c.className='url-chip';
    c.innerHTML=`<span>🔗</span><a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a><button class="url-del" data-i="${i}">✕</button>`;
    c.querySelector('.url-del').addEventListener('click',()=>{ it.urls.splice(i,1); save(); renderUrls(it); renderItems(); });
    ul.appendChild(c);
  });
}
document.getElementById('urlAdd').addEventListener('click', () => {
  if (!curId||!curDate) return;
  const inp = document.getElementById('mUrlIn'); const url = inp.value.trim(); if (!url) return;
  const it = (state.items[curDate]||[]).find(x => String(x.id) === curId); if (!it) return;
  if (!it.urls) it.urls=[];
  it.urls.push(url); save(); renderUrls(it); renderItems(); inp.value='';
});
document.getElementById('mUrlIn').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('urlAdd').click(); });

// Images
document.getElementById('imgDrop').addEventListener('click', () => document.getElementById('imgFile').click());
document.getElementById('imgFile').addEventListener('change', e => {
  if (!curId || !curDate) return;
  const it = (state.items[curDate]||[]).find(x => String(x.id) === curId);
  if (!it) return;
  if (!it.images) it.images = [];

  const files = Array.from(e.target.files);
  let pending = files.length;

  files.forEach(f => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(f);
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      URL.revokeObjectURL(objectUrl);
      it.images.push(compressed);
      pending--;
      if (pending === 0) {
        try { save(); } catch(err) {
          alert('画像が多すぎて保存できませんでした。不要な画像を削除してください。');
          it.images.pop();
        }
        renderImgs(it);
        renderItems();
      }
    };
    img.onerror = () => { pending--; URL.revokeObjectURL(objectUrl); };
    img.src = objectUrl;
  });
  e.target.value = '';
});

function renderImgs(it) {
  const g = document.getElementById('imgGrid');
  g.innerHTML = '';
  (it.images||[]).forEach((src, i) => {
    const w = document.createElement('div');
    w.className = 'img-wrap';
    w.innerHTML = `<img src="${src}" alt=""><button class="img-del">✕</button>`;
    // タップで全画面表示
    w.querySelector('img').addEventListener('click', () => openLightbox(src));
    w.querySelector('.img-del').addEventListener('click', () => {
      it.images.splice(i, 1);
      save();
      renderImgs(it);
      renderItems();
    });
    g.appendChild(w);
  });
}

// ━━ LIGHTBOX ━━
function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbImg').src = '';
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// ━━ INIT ━━
renderDateBar();
renderItems();
</script>
