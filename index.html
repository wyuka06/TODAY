<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today ✈ 旅のしおり</title>

<style>
body{font-family:sans-serif;padding:20px;background:#f0f8fb;}
.item-row{padding:10px;border:1px solid #ccc;margin-bottom:8px;background:#fff;border-radius:8px;}
.item-row.dragging{opacity:.5;transform:scale(1.03);}
.item-row.drag-over{border:2px solid #5BC4DC;}
</style>
</head>

<body>

<h2>旅のしおり（テスト版）</h2>

<input id="name" placeholder="予定">
<button onclick="addItem()">追加</button>

<div id="itemsList"></div>

<script>
let state = { items: [] };
let dragSrc = null;

function addItem(){
  const name = document.getElementById('name').value;
  if(!name) return;
  state.items.push({id:Date.now(), name});
  document.getElementById('name').value='';
  render();
}

function render(){
  const list=document.getElementById('itemsList');
  list.innerHTML='';
  state.items.forEach((it,idx)=>{
    const row=document.createElement('div');
    row.className='item-row';
    row.textContent=it.name;
    row.draggable=true;

    // PC
    row.addEventListener('dragstart',()=>{dragSrc=idx;row.classList.add('dragging');});
    row.addEventListener('dragend',()=>row.classList.remove('dragging'));
    row.addEventListener('dragover',e=>e.preventDefault());
    row.addEventListener('drop',()=>{
      const arr=state.items;
      const m=arr.splice(dragSrc,1)[0];
      arr.splice(idx,0,m);
      render();
    });

    // 📱スマホ長押し
    let timer; let dragging=false;

    row.addEventListener('touchstart',()=>{
      timer=setTimeout(()=>{
        dragging=true;
        dragSrc=idx;
        row.classList.add('dragging');
      },300);
    });

    row.addEventListener('touchmove',e=>{
      if(!dragging)return;
      const t=e.touches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const target=el?.closest('.item-row');

      document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('drag-over'));
      if(target)target.classList.add('drag-over');
    });

    row.addEventListener('touchend',e=>{
      clearTimeout(timer);
      if(!dragging)return;

      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const target=el?.closest('.item-row');

      if(target){
        const newIdx=[...target.parentNode.children].indexOf(target);
        const arr=state.items;
        const m=arr.splice(dragSrc,1)[0];
        arr.splice(newIdx,0,m);
        render();
      }

      dragging=false;
      dragSrc=null;
      row.classList.remove('dragging');
    });

    list.appendChild(row);
  });
}

render();
</script>

</body>
</html>
